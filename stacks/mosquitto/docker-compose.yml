services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped

    user: ${USER}:${GROUP}

    ports:
      - "1883:1883"
      - "9001:9001"

    volumes:
      - ${ROOT}/runtime/mosquitto/config:/mosquitto/config
      - ${ROOT}/runtime/mosquitto/data:/mosquitto/data
      - ${ROOT}/runtime/mosquitto/log:/mosquitto/log

    networks:
      - mqtt-net

networks:
  mqtt-net:
    external: true
