listener 1883

# Allow local network clients (simple setup)
allow_anonymous true

# =========================
# PERSISTENCE (keeps state)
# =========================
persistence true
persistence_location /mosquitto/data

# =========================
# LOGGING (Docker friendly)
# =========================
# Send logs to Docker instead of a file
log_dest stdout

# Only important logs
log_type error
log_type warning

# =========================
# AUTO SAVE (safe defaults)
# =========================
autosave_interval 1800
autosave_on_changes true