services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped

    ports:
      - "1883:1883"
      - "9001:9001"

    volumes:
      - ${ROOT}/runtime/mosquitto/config:/mosquitto/config
      - ${ROOT}/runtime/mosquitto/data:/mosquitto/data
      - ${ROOT}/runtime/mosquitto/log:/mosquitto/log

  zigbee2mqtt:
    image: ghcr.io/koenkk/zigbee2mqtt:2.10.0
    container_name: zigbee2mqtt
    restart: unless-stopped

    depends_on:
      - mosquitto

    ports:
      - "8080:8080"

    environment:
      - TZ=Europe/Rome

    volumes:
      - ${ROOT}/runtime/zigbee2mqtt:/app/data

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5
    container_name: homeassistant
    restart: unless-stopped

    ports:
      - "8123:8123"

    environment:
      - TZ=Europe/Rome

    volumes:
      - ${ROOT}/runtime/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
