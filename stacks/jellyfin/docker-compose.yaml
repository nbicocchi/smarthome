services:

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped

    user: ${USER}:${GROUP}

    ports:
      - "8096:8096"

    volumes:
      - ${ROOT}/runtime/jellyfin/config:/config
      - ${ROOT}/runtime/jellyfin/cache:/cache
      - ${ROOT}/media:/media
