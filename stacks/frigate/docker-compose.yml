# Docker Compose definition for the Frigate stack
services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:0.17.1
    container_name: frigate
    restart: unless-stopped

    #user: ${USER}:${GROUP}
    shm_size: "512mb"

    ports:
      - "5000:5000"   # UI
      - "1935:1935"   # RTMP stream
    
    volumes:
      - ${ROOT}/runtime/frigate/config:/config
      - ${ROOT}/runtime/frigate/media:/media
      - /etc/localtime:/etc/localtime:ro

    devices:
      - /dev/dri:/dev/dri

    networks:
      - mqtt-net

networks:
  mqtt-net:
    external: true